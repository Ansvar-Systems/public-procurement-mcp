name: Daily TED Ingestion

on:
  schedule:
    - cron: '0 5 * * *' # 05:00 UTC daily
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Ingest TED notices
        run: npm run ingest:ted

      - name: Rebuild materialized views
        run: npm run ingest:views

      - name: Check data freshness
        run: npm run check-freshness
