services:
  public-procurement-mcp:
    build: .
    ports:
      - "3200:3000"
    environment:
      - DB_PATH=/app/data/public-procurement.db
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
